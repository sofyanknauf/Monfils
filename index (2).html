@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
.gh-root {
  --bg:#FFFFFF; --surface:#FFFFFF; --elev:#F4F6F4; --fill:rgba(12,74,44,0.07);
  --ink:#12261B; --muted:#5F7A6B;
  --line:rgba(18,38,27,0.10); --line-strong:rgba(18,38,27,0.20);
  --tint:#0C4A2C; --tint-soft:rgba(12,74,44,0.10);
  --green:#0E7A43; --green-soft:rgba(14,122,67,0.13);
  --amber:#C58F06; --amber-soft:rgba(242,176,14,0.18);
  --red:#DC2626; --teal:#0E7A5A;
  color-scheme:light;
  position:relative; max-width:540px; margin:0 auto; min-height:100vh;
  background:#FFFFFF; color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Inter",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased; display:flex; flex-direction:column;
  padding-bottom:84px; letter-spacing:-0.01em;
}

.gh-head { padding:8px 20px 4px; background:transparent; }
.gh-head-actions { display:flex; justify-content:flex-end; gap:10px; min-height:38px; align-items:center; }
.gh-circ { width:36px; height:36px; border-radius:50%; border:none; cursor:pointer;
  background:var(--tint-soft); color:var(--tint); display:flex; align-items:center; justify-content:center;
  transition:transform .12s ease, background .15s; }
.gh-circ:active { transform:scale(.88); }
.gh-largetitle { font-size:34px; font-weight:700; letter-spacing:-0.022em; margin:2px 0 0;
  animation:titleIn .55s cubic-bezier(.32,.72,0,1); }
.gh-subtitle { margin:2px 0 8px; font-size:15px; color:var(--muted); font-weight:400; }
.gh-golddot { color:#F2B00E; }

.gh-main { flex:1; padding:6px 16px 8px; }
.gh-section { display:flex; flex-direction:column; gap:16px;
  animation:sectionIn .38s cubic-bezier(.32,.72,0,1); }
.gh-empty { text-align:center; color:var(--muted); padding:40px 0; }

.gh-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.gh-stat { position:relative; background:var(--surface); border-radius:18px; padding:15px 16px;
  display:flex; flex-direction:column; gap:3px; box-shadow:0 1px 3px rgba(18,38,27,.08), inset 0 0 0 .5px rgba(18,38,27,.08);
  animation:popIn .42s cubic-bezier(.32,.72,0,1) both; }
.gh-stat:nth-child(2){animation-delay:.05s;} .gh-stat:nth-child(3){animation-delay:.1s;} .gh-stat:nth-child(4){animation-delay:.15s;}
.gh-stat-ic { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px;
  border-radius:9px; margin-bottom:5px; background:var(--tint-soft); color:var(--tint); }
.gh-stat-val { font-size:23px; font-weight:700; letter-spacing:-0.02em; color:var(--ink); }
.gh-stat-lbl { font-size:12.5px; color:var(--muted); font-weight:500; }
.tone-green .gh-stat-val{color:var(--green);}
.tone-amber .gh-stat-val{color:var(--amber);}
.tone-red .gh-stat-val{color:var(--red);}
.gh-stat-ic{background:rgba(12,74,44,.08);color:var(--tint);}
.tone-green .gh-stat-ic{background:var(--green-soft);color:var(--green);}
.tone-amber .gh-stat-ic{background:var(--amber-soft);color:var(--amber);}
.tone-red .gh-stat-ic{background:rgba(255,69,58,.2);color:var(--red);}

.gh-h2 { font-size:20px; font-weight:700; letter-spacing:-0.02em; margin:8px 0 0; }
.gh-note { font-size:13px; color:var(--muted); margin:0; line-height:1.5; padding:0 4px; }

.gh-list { display:flex; flex-direction:column; gap:10px; }
.gh-groups { display:flex; flex-direction:column; gap:24px; }
.gh-group { display:flex; flex-direction:column; gap:10px; }
.gh-group-head { display:flex; align-items:center; gap:8px; padding:0 6px;
  font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); }

.gh-cust-body { flex:1; min-width:0; display:flex; flex-direction:column; gap:4px; }
.gh-cust-body .gh-card-line { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.gh-rank-badge { position:absolute; top:10px; left:10px; width:18px; height:18px; border-radius:50%;
  background:var(--tint); color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 0 2px var(--surface); }
.gh-cust .gh-money { flex:none; }

.gh-detail-hero { display:flex; flex-direction:column; align-items:center; gap:7px; padding:4px 0 6px; }
.gh-detail-name { font-size:21px; font-weight:700; letter-spacing:-0.02em; }
.gh-detail-sub { font-size:14px; color:var(--muted); margin-top:-3px; }

.gh-card-btn::after { transition:transform .2s ease; }
.gh-cust.gh-open::after { transform:translateY(-50%) rotate(45deg); }
.gh-cust-wrap { display:flex; flex-direction:column; }
.gh-cust-exp { background:var(--surface); border-radius:0 0 16px 16px; margin-top:-8px; padding:14px 16px 14px;
  box-shadow:0 1px 3px rgba(18,38,27,.08), inset 0 0 0 .5px rgba(18,38,27,.08);
  animation:expand .28s cubic-bezier(.32,.72,0,1); }
.gh-exp-actions { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.gh-visits { display:flex; flex-direction:column; }
.gh-visit { display:flex; align-items:center; gap:10px; padding:9px 0; font-size:14px; }
.gh-visit + .gh-visit { border-top:.5px solid var(--line); }
.gh-visit-date { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.gh-visit-amt { font-weight:600; }
.gh-visit-badge { font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px;
  background:var(--amber-soft); color:var(--amber); }
.gh-visit-badge.is-paid { background:var(--green-soft); color:var(--green); }
@keyframes expand { from{ opacity:0; transform:translateY(-6px); } }

.gh-total-row { display:flex; align-items:center; justify-content:space-between;
  background:var(--tint-soft); border-radius:12px; padding:12px 14px; }
.gh-total-row span { font-size:14px; font-weight:500; color:var(--muted); }
.gh-total-row strong { font-size:19px; font-weight:700; color:var(--tint); letter-spacing:-0.01em; }

.gh-payall { width:100%; }

.gh-route { display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:linear-gradient(135deg,#F5B50A,#D0900A); color:#0C3A22; border-radius:16px; padding:14px 16px; }
.gh-route-info { display:flex; flex-direction:column; gap:2px; }
.gh-route-title { font-size:16px; font-weight:700; letter-spacing:-0.01em; }
.gh-route-sub { font-size:13px; opacity:.92; }
.gh-route .gh-btn { background:rgba(255,255,255,.22); }
.gh-route .gh-btn:active { background:rgba(255,255,255,.3); }
.gh-route .gh-btn:disabled { opacity:.45; }

.gh-rank { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px;
  background:var(--tint-soft); color:var(--tint); border-radius:50%; font-size:12px; font-weight:700; margin-right:6px; }
.gh-total-pill { background:var(--amber-soft); color:var(--amber); font-size:14px; font-weight:700;
  padding:3px 12px; border-radius:999px; }
.gh-overdue { color:var(--red) !important; font-weight:600; }

.gh-hbars { display:flex; flex-direction:column; gap:12px; background:var(--surface); border-radius:16px; padding:16px; }
.gh-hbar { display:flex; flex-direction:column; gap:6px; }
.gh-hbar-head { display:flex; align-items:center; justify-content:space-between; font-size:14px; }
.gh-hbar-lbl { font-weight:500; }
.gh-hbar-track { height:8px; background:var(--fill); border-radius:6px; overflow:hidden; }
.gh-hbar-fill { height:100%; border-radius:6px; background:linear-gradient(90deg,#F5B50A,#CE8F06);
  animation:hbarGrow .6s cubic-bezier(.32,.72,0,1) both; transform-origin:left; }

@keyframes fadeIn { from{ opacity:0; } }
@keyframes sheetUp { from{ transform:translateY(100%); } }
@keyframes sectionIn { from{ opacity:0; transform:translateY(8px); } }
@keyframes titleIn { from{ opacity:0; transform:translateY(6px); } }
@keyframes popIn { from{ opacity:0; transform:scale(.96); } }
@keyframes barGrow { from{ transform:scaleY(0); } }
@keyframes hbarGrow { from{ transform:scaleX(0); } }
@media (prefers-reduced-motion:reduce){
  * { animation:none !important; }
  .gh-card-btn:active,.gh-btn:active,.gh-chip:active,.gh-iconbtn:active,.gh-circ:active,
  .gh-navbtn:active,.gh-paid:active,.gh-x:active,.gh-quickbtn:active{ transform:none; }
}
