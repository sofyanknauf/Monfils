@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
.gh-root {
  --bg:#FFFFFF; --surface:#FFFFFF; --elev:#F4F6F4; --fill:rgba(12,74,44,0.07);
  --ink:#12261B; --muted:#5F7A6B;
  --line:rgba(18,38,27,0.10); --line-strong:rgba(18,38,27,0.20);
  --tint:#0C4A2C; --tint-soft:rgba(12,74,44,0.10);
  --green:#0E7A43; --green-soft:rgba(14,122,67,0.13);
  --amber:#C58F06; --amber-soft:rgba(242,176,14,0.18);
  --red:#DC2626; --teal:#0E7A5A;
  color-scheme:light;
  position:relative; max-width:540px; margin:0 auto; min-height:100vh;
  background:#FFFFFF; color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Inter",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased; display:flex; flex-direction:column;
  padding-bottom:84px; letter-spacing:-0.01em;
}

.gh-head { padding:8px 20px 4px; background:transparent; }
.gh-head-actions { display:flex; justify-content:flex-end; gap:10px; min-height:38px; align-items:center; }
.gh-circ { width:36px; height:36px; border-radius:50%; border:none; cursor:pointer;
  background:var(--tint-soft); color:var(--tint); display:flex; align-items:center; justify-content:center;
  transition:transform .12s ease, background .15s; }
.gh-circ:active { transform:scale(.88); }
.gh-largetitle { font-size:34px; font-weight:700; letter-spacing:-0.022em; margin:2px 0 0;
  animation:titleIn .55s cubic-bezier(.32,.72,0,1); }
.gh-subtitle { margin:2px 0 8px; font-size:15px; color:var(--muted); font-weight:400; }
.gh-golddot { color:#F2B00E; }

.gh-main { flex:1; padding:6px 16px 8px; }
.gh-section { display:flex; flex-direction:column; gap:16px;
  animation:sectionIn .38s cubic-bezier(.32,.72,0,1); }
.gh-empty { text-align:center; color:var(--muted); padding:40px 0; }

.gh-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.gh-stat { position:relative; background:var(--surface); border-radius:18px; padding:15px 16px;
  display:flex; flex-direction:column; gap:3px; box-shadow:0 1px 3px rgba(18,38,27,.08), inset 0 0 0 .5px rgba(18,38,27,.08);
  animation:popIn .42s cubic-bezier(.32,.72,0,1) both; }
.gh-stat:nth-child(2){animation-delay:.05s;} .gh-stat:nth-child(3){animation-delay:.1s;} .gh-stat:nth-child(4){animation-delay:.15s;}
.gh-stat-ic { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px;
  border-radius:9px; margin-bottom:5px; background:var(--tint-soft); color:var(--tint); }
.gh-stat-val { font-size:23px; font-weight:700; letter-spacing:-0.02em; color:var(--ink); }
.gh-stat-lbl { font-size:12.5px; color:var(--muted); font-weight:500; }
.tone-green .gh-stat-val{color:var(--green);}
.tone-amber .gh-stat-val{color:var(--amber);}
.tone-red .gh-stat-val{color:var(--red);}
.gh-stat-ic{background:rgba(12,74,44,.08);color:var(--tint);}
.tone-green .gh-stat-ic{background:var(--green-soft);color:var(--green);}
.tone-amber .gh-stat-ic{background:var(--amber-soft);color:var(--amber);}
.tone-red .gh-stat-ic{background:rgba(255,69,58,.2);color:var(--red);}

.gh-h2 { font-size:20px; font-weight:700; letter-spacing:-0.02em; margin:8px 0 0; }
.gh-note { font-size:13px; color:var(--muted); margin:0; line-height:1.5; padding:0 4px; }

.gh-list { display:flex; flex-direction:column; gap:10px; }
.gh-groups { display:flex; flex-direction:column; gap:24px; }
.gh-group { display:flex; flex-direction:column; gap:10px; }
.gh-group-head { display:flex; align-items:center; gap:8px; padding:0 6px;
  font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); }
.gh-group-count { margin-left:auto; background:var(--surface); color:var(--muted);
  font-size:12px; font-weight:600; padding:1px 9px; border-radius:999px; letter-spacing:0; text-transform:none; }

.gh-chips { display:flex; gap:8px; overflow-x:auto; padding:2px 0 6px; -webkit-overflow-scrolling:touch; }
.gh-chips::-webkit-scrollbar{ display:none; }
.gh-chips-sm { flex-wrap:wrap; overflow:visible; }
.gh-chip { white-space:nowrap; background:var(--surface); border:none; color:var(--ink);
  font:inherit; font-size:14px; font-weight:500; padding:7px 14px; border-radius:999px; cursor:pointer;
  transition:transform .12s ease, background .15s, color .15s; }
.gh-chip:active{ transform:scale(.94); }
.gh-chip.active { background:var(--tint); color:#fff; }

.gh-card { background:var(--surface); border-radius:16px; padding:14px 16px;
  display:flex; flex-direction:column; gap:5px; text-align:left;
  box-shadow:0 1px 3px rgba(18,38,27,.08), inset 0 0 0 .5px rgba(18,38,27,.08); }
.gh-card-btn { position:relative; cursor:pointer; font:inherit; color:inherit; width:100%; border:none;
  padding-right:36px; transition:transform .12s ease, background .15s; }
.gh-card-btn:active{ transform:scale(.985); background:rgba(12,74,44,.04); }
.gh-card-btn::after { content:""; position:absolute; right:17px; top:50%; width:8px; height:8px;
  border-right:2px solid #5A5A5E; border-bottom:2px solid #5A5A5E;
  transform:translateY(-50%) rotate(-45deg); border-radius:1px; }
.gh-card-top { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.gh-card-title { font-weight:600; font-size:16px; letter-spacing:-0.01em; }
.gh-link { background:none; border:none; padding:0; font:inherit; font-weight:600; font-size:16px; color:var(--tint); cursor:pointer; text-align:left; }
.gh-card-line { display:flex; align-items:center; gap:6px; font-size:14px; color:var(--muted); }
.gh-money { font-weight:600; color:var(--ink); font-size:15px; }
.gh-pill { background:var(--tint-soft); color:var(--tint); font-size:12px; font-weight:600; padding:2px 9px; border-radius:999px; }

.gh-paid { align-self:flex-start; border:none; color:var(--amber); background:var(--amber-soft);
  font:inherit; font-size:13px; font-weight:600; padding:7px 13px; border-radius:999px; cursor:pointer;
  display:flex; align-items:center; gap:5px; transition:transform .12s ease; }
.gh-paid:active{ transform:scale(.94); }
.gh-paid.is-paid { color:var(--green); background:var(--green-soft); }
.gh-req { color:var(--tint); background:var(--tint-soft); }
.gh-job-actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }

.gh-plan { flex-direction:row; align-items:center; justify-content:space-between; gap:10px; }
.gh-plan-info { display:flex; flex-direction:column; gap:3px; }
.gh-plan-btns { display:flex; align-items:center; gap:8px; flex:none; }
.gh-iconbtn { width:40px; height:40px; border-radius:50%; border:none; background:var(--tint-soft);
  color:var(--tint); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .12s ease; }
.gh-iconbtn:active{ transform:scale(.88); }
.gh-when { font-size:13px; font-weight:600; }
.gh-when.late{color:var(--red);} .gh-when.today{color:var(--amber);} .gh-when.soon{color:var(--tint);} .gh-when.later{color:var(--muted);}

.gh-reset { margin:18px auto 4px; background:none; border:none; color:var(--red);
  font:inherit; font-size:14px; display:flex; align-items:center; gap:6px; cursor:pointer; }

.gh-emptystate { text-align:center; padding:56px 24px; display:flex; flex-direction:column; align-items:center; gap:8px; }
.gh-emptystate h2 { margin:0; font-size:20px; font-weight:700; }
.gh-emptystate p { margin:0 0 10px; color:var(--muted); font-size:15px; line-height:1.5; max-width:300px; }

.gh-btn { background:var(--tint); color:#fff; border:none; border-radius:13px; padding:12px 18px;
  font:inherit; font-weight:600; font-size:16px; cursor:pointer; display:inline-flex; align-items:center;
  justify-content:center; gap:6px; transition:transform .12s ease, filter .15s; }
.gh-btn:active{ transform:scale(.97); filter:brightness(.93); }
.gh-btn:disabled{ opacity:.4; }
.gh-btn.small { padding:9px 14px; font-size:14px; border-radius:11px; }
.gh-btn.ghost { background:var(--tint-soft); color:var(--tint); }
.gh-btn.ghost.danger { background:rgba(229,72,77,.16); color:var(--red); }
.gh-btn.danger { background:var(--red); }

.gh-nav { position:fixed; bottom:0; left:0; right:0; max-width:540px; margin:0 auto;
  background:rgba(255,255,255,.82); backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:.5px solid var(--line-strong); display:flex;
  padding:7px 4px calc(7px + env(safe-area-inset-bottom)); z-index:20; }
.gh-navbtn { flex:1; background:none; border:none; cursor:pointer; padding:4px 2px;
  display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--muted); font:inherit;
  transition:transform .1s ease; }
.gh-navbtn:active{ transform:scale(.9); }
.gh-navbtn span { font-size:10.5px; font-weight:500; letter-spacing:-0.01em; white-space:nowrap; }
.gh-navbtn.active { color:var(--tint); }

.gh-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:50;
  display:flex; align-items:flex-end; justify-content:center; animation:fadeIn .25s ease; }
.gh-sheet { position:relative; background:var(--surface); width:100%; max-width:540px;
  border-radius:14px 14px 0 0; max-height:92vh; overflow-y:auto;
  animation:sheetUp .46s cubic-bezier(.32,.72,0,1); }
.gh-sheet-head { position:sticky; top:0; background:var(--surface); padding:22px 18px 14px;
  display:flex; align-items:center; justify-content:space-between; border-bottom:.5px solid var(--line); }
.gh-sheet-head::before { content:""; position:absolute; top:8px; left:50%; transform:translateX(-50%);
  width:36px; height:5px; border-radius:3px; background:#48484A; }
.gh-sheet-head h3 { margin:0; font-size:18px; font-weight:700; letter-spacing:-0.01em; }
.gh-x { background:var(--fill); border:none; border-radius:50%; width:30px; height:30px;
  display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); transition:transform .12s; }
.gh-x:active{ transform:scale(.9); }
.gh-form { padding:16px 18px; display:flex; flex-direction:column; gap:14px; }
.gh-field { display:flex; flex-direction:column; gap:6px; flex:1; }
.gh-field span { font-size:13px; font-weight:500; color:var(--muted); padding-left:2px; }
.gh-field input, .gh-field select, .gh-field textarea {
  border:none; background:var(--fill); border-radius:12px; padding:13px 14px; font:inherit;
  font-size:16px; color:var(--ink); width:100%; transition:box-shadow .15s; }
.gh-field input:focus, .gh-field select:focus, .gh-field textarea:focus {
  outline:none; box-shadow:0 0 0 2px var(--tint); }
.gh-field textarea { resize:vertical; }
.gh-row { display:flex; gap:12px; }
.gh-check { display:flex; align-items:center; gap:10px; font-size:16px; font-weight:500; cursor:pointer; padding:4px 2px; }
.gh-check input { width:21px; height:21px; accent-color:var(--green); }
.gh-sheet-foot { display:flex; gap:10px; padding:14px 18px calc(16px + env(safe-area-inset-bottom));
  border-top:.5px solid var(--line); position:sticky; bottom:0; background:var(--surface); }
.gh-sheet-foot .gh-btn:last-child { flex:1; }

.gh-confirm { border-radius:20px; max-width:300px; margin:auto auto 30px; text-align:center;
  padding:24px 22px; align-self:center; animation:popIn .36s cubic-bezier(.32,.72,0,1); }
.gh-confirm h3 { margin:10px 0 6px; font-size:18px; font-weight:700; }
.gh-confirm p { margin:0 0 18px; color:var(--muted); font-size:14px; line-height:1.5; }
.gh-warn-ic { color:var(--amber); }
.gh-confirm .gh-row { gap:10px; }
.gh-confirm .gh-row .gh-btn { flex:1; }

.gh-seg { display:flex; background:var(--fill); border-radius:10px; padding:2px; gap:2px; }
.gh-seg-btn { flex:1; border:none; background:transparent; font:inherit; font-size:14px; font-weight:600;
  color:var(--ink); padding:8px; border-radius:8px; cursor:pointer; transition:background .2s; }
.gh-seg-btn.active { background:#fff; box-shadow:0 1px 3px rgba(18,38,27,.16); }

.gh-fin-head { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.gh-fin-head .gh-h2 { margin:0; }
.gh-chart { display:flex; align-items:flex-end; gap:8px; height:170px; padding:16px;
  background:var(--surface); border-radius:18px; }
.gh-bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; }
.gh-bar-val { font-size:10px; font-weight:600; color:var(--muted); }
.gh-bar-track { flex:1; width:68%; display:flex; align-items:flex-end; }
.gh-bar-fill { width:100%; min-height:4px; border-radius:6px; transform-origin:bottom;
  background:linear-gradient(180deg,#F5B50A,#CE8F06); animation:barGrow .6s cubic-bezier(.32,.72,0,1) both; }
.gh-bar-lbl { font-size:11px; color:var(--muted); font-weight:500; text-transform:capitalize; }
.gh-exp .gh-money { color:var(--red); }
.gh-exp { flex-direction:row; align-items:center; gap:12px; }
.gh-exp-thumb { width:46px; height:46px; border-radius:10px; object-fit:cover; flex:none;
  box-shadow:inset 0 0 0 .5px rgba(18,38,27,.14); }
.gh-exp-icon { width:46px; height:46px; border-radius:10px; flex:none; display:flex; align-items:center;
  justify-content:center; background:rgba(255,69,58,.18); color:var(--red); }
.gh-bon { display:flex; flex-direction:column; gap:10px; align-items:flex-start; }
.gh-bon img { width:100%; max-height:220px; object-fit:cover; border-radius:12px; cursor:pointer;
  box-shadow:inset 0 0 0 .5px rgba(18,38,27,.14); }
.gh-bon-add { display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;
  background:var(--fill); color:var(--ink); border-radius:12px; padding:16px; font-weight:600; font-size:15px; }
.gh-lightbox { position:fixed; inset:0; z-index:60; background:rgba(0,0,0,.92);
  display:flex; align-items:center; justify-content:center; padding:16px; animation:fadeIn .2s ease; }
.gh-lightbox img { max-width:100%; max-height:100%; border-radius:12px; }

.gh-planmaker-btn { width:100%; background:var(--surface); color:var(--tint);
  box-shadow:inset 0 0 0 1px var(--tint-soft); }
.gh-planmaker-btn:active { filter:none; transform:scale(.99); }
